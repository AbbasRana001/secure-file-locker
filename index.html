<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure File Locker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/1.119.0/iconfont/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0efe9;
      --surface:    #faf9f7;
      --surface2:   #f5f4f0;
      --hover:      #eeede8;
      --border:     #e0dfd8;
      --border-mid: #bbb9b3;
      --text:       #1c1b19;
      --muted:      #888580;
      --hint:       #aaa8a2;
      --ink:        #1c1b19;
      --ink-inv:    #f0efe9;
      --green-bg:   #dcfce7;
      --green-txt:  #166534;
      --purple-bg:  #e8e6ff;
      --purple-txt: #4338ca;
      --mono: 'Courier New', Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 100px;
    }

    /* Wordmark */
    .wordmark { display: flex; align-items: center; gap: 10px; margin-bottom: 48px; }
    .wm-icon {
      width: 34px; height: 34px;
      background: var(--ink); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .wm-icon i { font-size: 17px; color: var(--ink-inv); }
    .wm-text { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }

    /* Panel */
    .panel {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .panel-header { padding: 28px 32px 24px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 22px; font-weight: 600; letter-spacing: -0.04em; color: var(--text); margin-bottom: 4px; }
    .panel-sub { font-size: 13px; color: var(--muted); }
    .panel-body { padding: 28px 32px; display: flex; flex-direction: column; gap: 22px; }

    /* Field group */
    .fg { display: flex; flex-direction: column; gap: 7px; }
    .fl { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--hint); text-transform: uppercase; }

    /* Drop zone */
    .drop-zone {
      position: relative; border: 1.5px dashed var(--border);
      border-radius: 14px; padding: 22px 16px;
      text-align: center; cursor: pointer; background: var(--surface2);
      transition: background 0.15s, border-color 0.15s;
    }
    .drop-zone:hover { border-color: var(--border-mid); background: var(--hover); }
    .drop-zone.dragging { border-color: var(--ink); border-style: solid; background: var(--hover); }
    .drop-zone.has-file { border-style: solid; border-color: #2d6a4f55; background: #f0f7f3; }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dz-icon { font-size: 24px; color: var(--hint); margin-bottom: 7px; display: block; }
    .drop-zone.has-file .dz-icon { color: #2d6a4f; }
    .dz-main { font-size: 13px; font-weight: 500; color: var(--muted); }
    .drop-zone.has-file .dz-main { color: var(--text); font-weight: 600; }
    .dz-sub { font-size: 11px; color: var(--hint); margin-top: 3px; }

    /* Separator */
    .sep { display: flex; align-items: center; gap: 10px; }
    .sep-line { flex: 1; height: 1px; background: var(--border); }
    .sep-text { font-size: 11px; color: var(--hint); font-weight: 500; letter-spacing: 0.04em; }

    /* Textarea */
    textarea {
      width: 100%; padding: 12px 14px; font-size: 13px;
      font-family: var(--mono); border: 1px solid var(--border);
      border-radius: 12px; background: var(--surface2);
      color: var(--text); resize: none; line-height: 1.6; outline: none;
      transition: border-color 0.14s, background 0.14s;
    }
    textarea:focus { border-color: var(--border-mid); background: var(--surface); }
    textarea::placeholder { color: var(--hint); }

    /* Key */
    .key-wrap { position: relative; }
    .key-wrap input {
      width: 100%; padding: 11px 44px 11px 14px; font-size: 14px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface2); color: var(--text);
      font-family: 'Inter', sans-serif; outline: none; letter-spacing: 0.04em;
      transition: border-color 0.14s, background 0.14s;
    }
    .key-wrap input:focus { border-color: var(--border-mid); background: var(--surface); }
    .key-wrap input::placeholder { color: var(--hint); letter-spacing: 0; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--hint);
      font-size: 17px; display: flex; align-items: center;
      transition: color 0.14s;
    }
    .eye-btn:hover { color: var(--muted); }

    /* Buttons */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn {
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.14s, border-color 0.14s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; transform: none; }
    .btn i { font-size: 15px; }
    .btn-lock { background: var(--ink); color: var(--ink-inv); border: 1px solid var(--ink); }
    .btn-lock:hover:not(:disabled) { background: #2e2d2a; }
    .btn-unlock { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-unlock:hover:not(:disabled) { background: var(--hover); border-color: var(--border-mid); }

    /* Output */
    .output-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .output-tools { display: flex; gap: 6px; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 20px;
    }
    .badge i { font-size: 10px; }
    .badge-enc { background: var(--purple-bg); color: var(--purple-txt); }
    .badge-dec { background: var(--green-bg); color: var(--green-txt); }
    .tool-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 4px 10px; font-size: 11.5px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
      font-family: 'Inter', sans-serif; font-weight: 500;
      transition: all 0.14s;
    }
    .tool-btn:hover { background: var(--hover); border-color: var(--border-mid); color: var(--text); }
    .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .tool-btn i { font-size: 13px; }
    .output-box {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px; font-family: var(--mono); font-size: 12.5px;
      color: var(--text); line-height: 1.65;
      white-space: pre-wrap; word-break: break-all; min-height: 100px;
    }
    .output-placeholder { color: var(--hint); font-style: italic; font-family: 'Inter', sans-serif; }
    .dl-btn {
      width: 100%; margin-top: 8px; padding: 10px;
      border: 1px solid var(--border); border-radius: 12px;
      background: none; font-size: 12.5px; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Inter', sans-serif; font-weight: 500;
      transition: all 0.14s;
    }
    .dl-btn:hover:not(:disabled) { background: var(--hover); border-color: var(--border-mid); color: var(--text); }
    .dl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .dl-btn i { font-size: 14px; }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 999; }
    .toast {
      background: var(--ink); color: var(--ink-inv);
      padding: 10px 18px; border-radius: 10px;
      font-size: 12.5px; font-weight: 500;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #7f1d1d; color: #fee2e2; }
    .toast i { font-size: 14px; }

    @media (max-width: 540px) {
      .shell { padding: 32px 16px 80px; }
      .panel-header, .panel-body { padding-left: 20px; padding-right: 20px; }
      .actions { grid-template-columns: 1fr; }
      .wordmark { margin-bottom: 32px; }
    }
  </style>
</head>
<body>

<div class="shell">

  <div class="wordmark">
    <div class="wm-icon"><i class="ti ti-lock" aria-hidden="true"></i></div>
    <span class="wm-text">Secure File Locker</span>
  </div>

  <main class="panel" aria-label="Secure File Locker">
    <div class="panel-header">
      <h1 class="panel-title">Encrypt or decrypt</h1>
      <p class="panel-sub">Upload a .txt file or paste text, enter a key, then lock or unlock.</p>
    </div>

    <div class="panel-body">

      <div class="fg">
        <span class="fl">File</span>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".txt" aria-label="Upload a .txt file" />
          <i class="ti ti-file-text dz-icon" id="dzIcon" aria-hidden="true"></i>
          <p class="dz-main" id="dzMain">Drop a .txt file, or click to browse</p>
          <p class="dz-sub" id="dzSub">Accepts .txt files only</p>
        </div>
      </div>

      <div class="sep">
        <div class="sep-line"></div>
        <span class="sep-text">or paste text</span>
        <div class="sep-line"></div>
      </div>

      <div class="fg">
        <textarea id="pasteArea" rows="4" placeholder="Paste plaintext or ciphertext here…" aria-label="Text to encrypt or decrypt"></textarea>
      </div>

      <div class="fg">
        <span class="fl">Key</span>
        <div class="key-wrap">
          <input type="password" id="keyInput" placeholder="Enter keyword — letters only" autocomplete="off" aria-label="Vigenère cipher key" />
          <button class="eye-btn" id="toggleKey" aria-label="Toggle key visibility">
            <i class="ti ti-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="fg">
        <div class="actions">
          <button class="btn btn-lock" id="encBtn" disabled>
            <i class="ti ti-lock"></i> Lock
          </button>
          <button class="btn btn-unlock" id="decBtn" disabled>
            <i class="ti ti-lock-open"></i> Unlock
          </button>
        </div>
      </div>

      <div class="fg">
        <div class="output-bar">
          <span class="fl" style="margin:0">Output</span>
          <div class="output-tools">
            <span id="modeBadge" style="display:none"></span>
            <button class="tool-btn" id="copyBtn" disabled aria-label="Copy output">
              <i class="ti ti-copy"></i> Copy
            </button>
          </div>
        </div>
        <div class="output-box" id="preview" role="region" aria-label="Cipher output">
          <span class="output-placeholder" id="placeholder">Result appears here.</span>
        </div>
        <button class="dl-btn" id="dlBtn" disabled aria-label="Download output as .txt">
          <i class="ti ti-download"></i> Download .txt
        </button>
      </div>

    </div>
  </main>

</div>

<div class="toast-wrap">
  <div class="toast" id="toast" role="alert" aria-live="polite">
    <i class="ti ti-check" id="toastIcon"></i>
    <span id="toastMsg"></span>
  </div>
</div>

<script>
  let fileText = '', outputText = '', keyVisible = false;
  const $ = id => document.getElementById(id);
  const pasteArea=$('pasteArea'), keyInput=$('keyInput'), encBtn=$('encBtn'), decBtn=$('decBtn');
  const preview=$('preview'), placeholder=$('placeholder'), copyBtn=$('copyBtn'), dlBtn=$('dlBtn');
  const dropZone=$('dropZone'), fileInput=$('fileInput'), dzIcon=$('dzIcon'), dzMain=$('dzMain'), dzSub=$('dzSub');
  const modeBadge=$('modeBadge'), toggleKey=$('toggleKey'), eyeIcon=$('eyeIcon');
  const toast=$('toast'), toastMsg=$('toastMsg'), toastIcon=$('toastIcon');

  function checkReady() {
    const hasText = pasteArea.value.trim().length > 0 || fileText.length > 0;
    const hasKey = keyInput.value.replace(/[^a-zA-Z]/g, '').length > 0;
    encBtn.disabled = decBtn.disabled = !(hasText && hasKey);
  }
  function showToast(msg, err = false) {
    toastMsg.textContent = msg;
    toast.className = 'toast' + (err ? ' error' : '');
    toastIcon.className = err ? 'ti ti-x' : 'ti ti-check';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }
  function setOutput(text, mode) {
    outputText = text;
    placeholder.style.display = 'none';
    preview.textContent = text.slice(0, 6000) + (text.length > 6000 ? '\n…(truncated for preview)' : '');
    copyBtn.disabled = dlBtn.disabled = false;
    modeBadge.style.display = 'inline-flex';
    modeBadge.className = 'badge ' + (mode === 'enc' ? 'badge-enc' : 'badge-dec');
    modeBadge.innerHTML = mode === 'enc'
      ? '<i class="ti ti-lock"></i>Encrypted'
      : '<i class="ti ti-lock-open"></i>Decrypted';
  }
  function vigenere(text, key, enc) {
    const k = key.toUpperCase().replace(/[^A-Z]/g, '');
    if (!k.length) return text;
    let ki = 0;
    return text.split('').map(ch => {
      if (/[a-zA-Z]/.test(ch)) {
        const up = ch === ch.toUpperCase(), base = up ? 65 : 97;
        const shift = k.charCodeAt(ki % k.length) - 65;
        const code = ch.toUpperCase().charCodeAt(0) - 65;
        const r = enc ? (code + shift) % 26 : (code - shift + 26) % 26;
        ki++;
        return String.fromCharCode(r + base);
      }
      return ch;
    }).join('');
  }
  function loadFile(f) {
    if (!f) return;
    if (!f.name.endsWith('.txt')) { showToast('Please upload a .txt file', true); return; }
    const r = new FileReader();
    r.onload = ev => {
      fileText = ev.target.result;
      pasteArea.value = fileText.slice(0, 3000) + (fileText.length > 3000 ? '…' : '');
      dropZone.classList.add('has-file');
      dzIcon.className = 'ti ti-file-check dz-icon';
      dzMain.textContent = f.name;
      dzSub.textContent = (f.size / 1024).toFixed(1) + ' KB';
      checkReady();
    };
    r.readAsText(f);
  }
  fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); loadFile(e.dataTransfer.files[0]); });
  pasteArea.addEventListener('input', () => { fileText = ''; checkReady(); });
  keyInput.addEventListener('input', checkReady);
  toggleKey.addEventListener('click', () => {
    keyVisible = !keyVisible;
    keyInput.type = keyVisible ? 'text' : 'password';
    eyeIcon.className = keyVisible ? 'ti ti-eye-off' : 'ti ti-eye';
  });
  encBtn.addEventListener('click', () => {
    const t = fileText || pasteArea.value, k = keyInput.value;
    if (!k.replace(/[^a-zA-Z]/g, '').length) { showToast('Key must contain letters', true); return; }
    setOutput(vigenere(t, k, true), 'enc');
    showToast('Encrypted successfully');
  });
  decBtn.addEventListener('click', () => {
    const t = fileText || pasteArea.value, k = keyInput.value;
    if (!k.replace(/[^a-zA-Z]/g, '').length) { showToast('Key must contain letters', true); return; }
    setOutput(vigenere(t, k, false), 'dec');
    showToast('Decrypted successfully');
  });
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(outputText).then(() => showToast('Copied to clipboard'));
  });
  dlBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([outputText], { type: 'text/plain' }));
    a.download = 'secure_output.txt'; a.click(); URL.revokeObjectURL(a.href);
    showToast('Downloaded secure_output.txt');
  });
</script>
</body>
</html>
